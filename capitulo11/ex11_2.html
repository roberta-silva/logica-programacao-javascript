<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <title>Teatro: Reserva de Poltronas</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <h1>Teatro: Reserva de Poltronas</h1>
        <form>
          <div class="row">
            <div class="col-sm-2">
              <p>
                <label for="inPoltrona">N° Poltrona:</label>
                <input type="number" min="1" class="form-control" name="inPoltrona" id="inPoltrona" required autofocus>
              </p>
            </div>
            <div class="col-sm-4">
              <input type="submit" class="btn btn-primary mt-4" value="Reservar">
              <input type="button" class="btn btn-danger mt-4" value="Confirmar Reserva" id="btnConfirmar">
            </div>
            <div class="col-sm-6">
              Legenda:
              <p class="mt-2">
                <img src="./img/disponivel.jpg" alt="">Disponível
                <img src="./img/reservada.jpg" alt="">Reservada
                <img src="./img/ocupada.jpg" alt="">Ocupada
              </p>
            </div>
          </div>
        </form>
        <div class="row">
          <div class="col-sm-12" id="divPalco">
            <p class="bg-primary text-white text-center">Palco do Teatro</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="./js/ex11_2.js"></script>
</body>

</html>
