<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <title>Jockey Club</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <h1>Jockey Club</h1>
        <form>
          <div class="row">
            <div class="col-sm-6">
              <label for="inCavalo">N° Cavalo:</label>
              <input type="number" min="1" class="form-control" id="inCavalo" required autofocus>
            </div>
            <div class="col-sm-6">
              <h5 id="outCavalo" class="mt-4">
                </h5>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6">
              <label for="inAposta">Aposta R$:</label>
              <input type="number" min="1" step="0.05" class="form-control" id="inAposta" required>
            </div>
            <div class="col-sm-6">
              <input type="submit" class="btn btn-primary mt-4" value="Apostar" id="btnApostar">
              <input type="button" class="btn btn-warning mt-4" value="Resumo" id="btnResumo">
              <input type="button" class="btn btn-success mt-4" value="Ganhador" id="btnGanhador">
              <input type="button" class="btn btn-danger mt-4" value="Novo Páreo" id="btnNovo">
            </div>
          </div>
        </form>
        <pre class="mt-3"></pre>
      </div>
    </div>
  </div>
  <script src="./js/ex11_1.js"></script>
</body>

</html>
