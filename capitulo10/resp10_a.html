<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <title>Velas de Aniversário</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-7" id="divVelas">
        <form>
          <h1>Velas de Aniversário</h1>
          <p>
            <label for="inIdade">Idade:</label>
            <input type="number" name="inIdade" id="inIdade" min="0" max="120" class="form-control" placeholder="Idade de 1 a 120" required autofocus>
          </p>
          <p>
            <input type="submit" value="Exibir Velas" id="btnExibir" class="btn btn-primary">
            <input type="reset" value="Novas Velas" class="btn btn-danger">
          </p>
        </form>
      </div>
    </div>
  </div>
  <script src="./js/resp10_a.js"></script>
</body>

</html>
