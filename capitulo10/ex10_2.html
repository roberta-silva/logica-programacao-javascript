<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <title>Vamos Brincar de Dinheiro?</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-7" id="divMoedas">
        <form>
          <h1>Vamos Brincar de Dinheiro?</h1>
          <p>
            <label for="inSoma">A soma das moedas exibidas abaixo é:</label>
            <input type="number" name="inSoma" id="inSoma" min="0" step="0.05" class="form-control" required autofocus>
          </p>
          <p>
            <input type="submit" value="Conferir Resposta" class="btn btn-primary">
            <input type="reset" value="Exibir Novas Moedas" class="btn btn-danger">
          </p>
        </form>
      </div>
    </div>
  </div>
  <script src="./js/ex10_2.js"></script>
</body>

</html>
