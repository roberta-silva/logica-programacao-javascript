<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <title>Meus Filmes Favoritos</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-8">
        <h1>Meus Filmes Favoritos</h1>
        <form>
          <p>
            <label for="inTitulo">Titulo do filme:</label>
            <input type="nimber" name="inTitulo" id="inTitulo" class="form-control" required autofocus>
          </p>
          <p>
            <label for="inGenero">Gênero:</label>
            <input type="text" name="inGenero" id="inGenero" class="form-control" required>
          </p>
          <input type="submit" class="btn btn-primary" value="Adicionar">
        </form>
        <table class="table table-striped">
          <tr>
            <th>Título do Filme</th>
            <th>Gênero</th>
            <th>Ações</th>
          </tr>
        </table>
      </div>
    </div>
  </div>
  <script src="./js/ex10_3.js"></script>
</body>

</html>
