<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <title>Copa do Brasil - Classificados</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-12" id="divClube">
        <form>
          <h1>Copa do Brasil - Classificados</h1>
          <p>
            <label for="inClube">Clube:</label>
            <input type="text" name="inClube" id="inClube" class="form-control" required autofocus>
          </p>
          <p>
            <input type="submit" value="Adicionar" id="btnAdicionar" class="btn btn-primary">
            <input type="button" value="Montar Tabela" id="btnMontar" class="btn btn-success">
            <input type="reset" value="Novos Clubes" id="btnNovos" class="btn btn-danger">
          </p>
        </form>
      </div>
    </div>
  </div>
  <script src="./js/resp10_c.js"></script>
</body>

</html>
